<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/pokemon.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/dialog.css" />
    <script src="./scripts/api.js" defer></script>
    <script src="./scripts/templates.js" defer></script>
    <script src="./scripts/dialog.js" defer></script>
    <script src="./script.js" defer></script>

</head>

<body>
    <header>
        <div class="header-brand">
            <img src="./assets/icons/pokeball.png" alt="" />
            <h1>Pokédex</h1>
        </div>
        <form class="serch-form" role="search">
            <label for="pokemonSearch">Search Pokémon</label>
            <input id="pokemonSearch" data-id="search-input" type="search" placeholder="Enter at least 3 letters">
            <button data-id="search-button" type="submit">Search</button>
        </form>
    </header>
    <main data-id="content">
        <!-- TODO: Add Pokémon overview section -->
        <!-- TODO: Add Pokémon list container -->
        <!-- TODO: Add loading feedback -->
        <!-- TODO: Add not-found message with data-id="not-found" -->
        <!-- TODO: Add load more button with data-id="load-more-button" -->
        <section class="pokemon-section" id="pokemon-section" aria-labelledby="pokemonSectionTitle">
            <h2 id="pokemonSectionTitle">All Pokémon</h2>
            <div class="pokemon-grid" id="pokemonGrid">
                <!--TODO: Pokémon cards will be rendered here -->
            </div>
            <button class="load-more-button" data-id="load-more-button" type="button">
                Load more
            </button>
        </section>
    </main>
    <dialog class="pokemon-dialog" data-id="dialog" open>
        <!-- TODO: Remove open attribute after dialog styling -->
        <div class="pokemon-dialog-card" data-id="overlay-pokemon-name"></div>
    </dialog>
    <footer class="main-footer">
        <a class="main-footer-img" href="https://developerakademie.com/" target="_blank" rel="noopener"
            aria-label="Besuch die Webseite der Developer Akademie"><img src="./assets/icons/da-icon.svg"
                alt="Developer Akademie Logo" />
            <img src="./assets/icons/da-text.svg" alt="Developer Akademie" />
        </a>
        <small class="main-footer-info">© 2023 Developer Akademie GmbH</small>
    </footer>

</body>

</html>
