<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/pokemon.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/dialog.css" />
    <script src="./script.js" defer></script>

</head>

<body>
    <header>
        <div class="header-brand">
            <img src="./assets/icons/pokeball.png" alt="" />
            <h1>Pokédex</h1>
        </div>
        <form class="serch-form" role="search">
            <label for="pokemonSearch">Search Pokémon</label>
            <input id="pokemonSearch" data-id="search-input" type="search" placeholder="Enter at least 3 letters">
            <button data-id="search-button" type="submit">Search</button>
        </form>
    </header>
    <main data-id="content">
        <!-- TODO: Add Pokémon overview section -->
        <!-- TODO: Add Pokémon list container -->
        <!-- TODO: Add loading feedback -->
        <!-- TODO: Add not-found message with data-id="not-found" -->
        <!-- TODO: Add load more button with data-id="load-more-button" -->
        <section class="pokemon-section" id="pokemon-section" aria-labelledby="pokemonSectionTitle">
            <h2 id="pokemonSectionTitle">All Pokémon</h2>
            <div class="pokemon-grid" id="pokemonGrid">
                <!--TODO: Pokémon cards will be rendered here -->
            </div>
            <button class="load-more-button" data-id="load-more-button" type="button">
                Load more
            </button>
        </section>
    </main>
    <dialog class="pokemon-dialog" data-id="dialog" open>
        <!-- TODO: Remove open attribute after dialog styling -->
        <div class="pokemon-dialog-card" data-id="overlay-pokemon-name">
            <!-- TODO: Build static dialog prototype for styling -->
            <!-- CHECK: Dialog must include all required data-id attributes -->
            <button class="dialog-close-button" data-id="close-dialog-button" type="button" aria-label="Close dialog">
                <img src="./assets/icons/close-icon.svg" alt="">
            </button>
            <section class="pokemon-dialog-hero">
                <p class="pokemon-dialog-id">#006</p>
                <h2>Charizard</h2>
                <div class="pokemon-dialog-types">
                    <!-- type badges later -->
                </div>
                <div class="pokemon-dialog-image-wrapper">
                    <img class="pokemon-dialog-image" data-id="dialog-image" src="" alt="">
                </div>
            </section>
            <nav class="pokemon-dialog-tabs" aria-label="Pokémon detail sections">
                <button type="button">About</button>
                <button type="button">Base Stats</button>
                <button type="button">Abilities</button>
                <button type="button">Moves</button>
            </nav>

            <section class="pokemon-dialog-details">
                <div class="pokemon-detail-row">
                    <span>Height</span>
                    <strong>1.7 m</strong>
                </div>

                <div class="pokemon-detail-row">
                    <span>Weight</span>
                    <strong>90.5 kg</strong>
                </div>

                <div class="pokemon-detail-row">
                    <span>Types</span>
                    <strong>Fire, Flying</strong>
                </div>

                <div class="pokemon-detail-row">
                    <span>Abilities</span>
                    <strong>Blaze</strong>
                </div>
                <!-- about and stats later -->
            </section>

            <div class="pokemon-dialog-navigation">
                <button data-id="prev-button" type="button" aria-label="Show previous Pokémon">
                    <img src="./assets/icons/arrow-left.svg" alt="">
                </button>

                <button data-id="next-button" type="button" aria-label="Show next Pokémon">
                    <img src="./assets/icons/arrow-right.svg" alt="">
                </button>
            </div>
        </div>
    </dialog>
    <footer class="main-footer">
        <a class="main-footer-img" href="https://developerakademie.com/" target="_blank" rel="noopener"
            aria-label="Besuch die Webseite der Developer Akademie"><img src="./assets/icons/da-icon.svg"
                alt="Developer Akademie Logo" />
            <img src="./assets/icons/da-text.svg" alt="Developer Akademie" />
        </a>
        <small class="main-footer-info">© 2023 Developer Akademie GmbH</small>
    </footer>

</body>

</html>
